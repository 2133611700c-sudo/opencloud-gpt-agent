name: Call Rescue Prospecting

on:
  pull_request:
    paths:
      - "products/call-rescue-kit/**"
      - "scripts/openclaw-business-*.mjs"
      - ".github/workflows/call-rescue-prospecting-v2.yml"
  push:
    branches: [main]
    paths:
      - "products/call-rescue-kit/**"
      - "scripts/openclaw-business-*.mjs"
      - ".github/workflows/call-rescue-prospecting-v2.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 16 * * 1-5"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node --check scripts/openclaw-business-lead-collector.mjs
      - run: node --check scripts/openclaw-business-outreach-draft.mjs
      - run: node --check scripts/openclaw-business-evidence-summary.mjs
      - run: node --check scripts/openclaw-business-prospect-runner.mjs

  prospect:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: ops/agent-control/reports/business-lead-audit/run-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run public prospect research
        env:
          OPENCLAW_BUSINESS_TASK_FILE: products/call-rescue-kit/tasks/OC-CALL-RESCUE-PROSPECTING-001.json
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/openclaw-business-prospect-runner.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: call-rescue-prospecting-${{ github.run_id }}
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: error
          retention-days: 30
      - name: Commit evidence reports
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "$(git status --short -- "$REPORT_DIR")" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A "$REPORT_DIR"
            git commit -m "chore(call-rescue): add prospecting evidence run ${{ github.run_id }}"
            git push
          fi
      - name: Enforce truthful result
        run: node scripts/openclaw-business-evidence-summary.mjs --enforce
