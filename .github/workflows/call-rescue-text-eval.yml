name: Call Rescue Text Evaluation

on:
  pull_request:
    paths:
      - "scripts/call-rescue-patter-text-eval.mjs"
      - ".github/workflows/call-rescue-text-eval.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PATTER_TELEMETRY_DISABLED: "1"
      DO_NOT_TRACK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned Patter SDK in isolation
        run: |
          mkdir -p /tmp/call-rescue-text-eval
          cd /tmp/call-rescue-text-eval
          npm init -y >/dev/null
          npm install --no-audit --no-fund --save-exact getpatter@0.6.8
          cp "$GITHUB_WORKSPACE/scripts/call-rescue-patter-text-eval.mjs" ./eval.mjs
      - name: Run deterministic terminal conversation
        run: |
          cd /tmp/call-rescue-text-eval
          printf '%s\n' \
            'I smell gas near the furnace' \
            'How much will the repair cost?' \
            'A pipe burst and water is everywhere' \
            'Can I schedule someone tomorrow?' \
            '/history' \
            '/quit' | node eval.mjs | tee "$GITHUB_WORKSPACE/call-rescue-text-eval.log"
      - name: Enforce routing and truthfulness assertions
        run: |
          grep -q 'EVAL_EVENT:CALL_STARTED' call-rescue-text-eval.log
          grep -q 'immediate safety hazard' call-rescue-text-eval.log
          grep -q 'cannot provide or guarantee a price' call-rescue-text-eval.log
          grep -q 'cannot promise an arrival time' call-rescue-text-eval.log
          grep -q 'appointment remains unconfirmed' call-rescue-text-eval.log
          grep -q '"started":1' call-rescue-text-eval.log
          grep -q '"ended":1' call-rescue-text-eval.log
          grep -q '"messages":4' call-rescue-text-eval.log
          grep -q 'SAFETY_ESCALATION' call-rescue-text-eval.log
          grep -q 'NO_PRICE_PROMISE' call-rescue-text-eval.log
          grep -q 'URGENT_CALLBACK' call-rescue-text-eval.log
          grep -q 'SCHEDULING_REQUEST' call-rescue-text-eval.log
          ! grep -Eiq '\$[0-9]+|arrive in [0-9]+|confirmed appointment|licensed technician is on the way' call-rescue-text-eval.log
      - uses: actions/upload-artifact@v4
        with:
          name: call-rescue-text-eval
          path: call-rescue-text-eval.log
          if-no-files-found: error
          retention-days: 30
