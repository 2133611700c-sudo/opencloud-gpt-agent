name: OpenClaw Heartbeat

on:
  workflow_dispatch:
  push:
    paths:
      - "ops/agent-control/tasks/OC-001-openclaw-heartbeat.yaml"
      - "ops/agent-control/triggers/openclaw-heartbeat-*.txt"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Build evidence report
        run: |
          mkdir -p ops/agent-control/reports/openclaw-heartbeat
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="ops/agent-control/reports/openclaw-heartbeat/${TS}.md"
          echo "# OpenClaw Cloud Heartbeat" > "$OUT"
          echo "" >> "$OUT"
          echo "UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$OUT"
          echo "Git SHA: ${GITHUB_SHA}" >> "$OUT"
          echo "Runner: ${RUNNER_OS}/${RUNNER_ARCH}" >> "$OUT"
          echo "Safety: no production code changes, evidence-only run" >> "$OUT"
          echo "Status: PASS" >> "$OUT"
          echo "Next action: run browser audit task packet" >> "$OUT"

      - name: Commit evidence
        run: |
          if [ -n "$(git status --porcelain -- ops/agent-control/reports/openclaw-heartbeat)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ops/agent-control/reports/openclaw-heartbeat
            git commit -m "ops(agent): add OpenClaw cloud heartbeat"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No evidence changes."
          fi
