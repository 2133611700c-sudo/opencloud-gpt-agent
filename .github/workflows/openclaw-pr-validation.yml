name: OpenClaw PR Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node --check scripts/openclaw-task-runner.mjs
      - run: node --check scripts/openclaw-job-lead-collector.mjs
      - run: npx playwright install chromium

      - name: Heartbeat sample
        run: |
          export TASK_FILE=ops/agent-control/tasks/OC-OPENCLAW-HEARTBEAT-001.json
          export FORCE_RERUN=true
          export OPENCLAW_LATEST_FILE=ops/agent-control/reports/openclaw-latest.pr-heartbeat.json
          node scripts/openclaw-task-runner.mjs

      - name: Worker heartbeat sample
        run: |
          export TASK_FILE=ops/agent-control/tasks/OC-WORKER-HEARTBEAT-SAMPLE.json
          export FORCE_RERUN=true
          export OPENCLAW_LATEST_FILE=ops/agent-control/reports/openclaw-latest.pr-worker-heartbeat.json
          node scripts/openclaw-task-runner.mjs

      - name: Job lead collect sample
        run: |
          export TASK_FILE=ops/agent-control/tasks/OC-JOB-LEAD-COLLECT-SAMPLE.json
          export FORCE_RERUN=true
          export OPENCLAW_LATEST_FILE=ops/agent-control/reports/openclaw-latest.pr-collect.json
          node scripts/openclaw-task-runner.mjs

      - name: Job lead audit sample
        run: |
          export TASK_FILE=ops/agent-control/tasks/OC-JOB-LEAD-AUDIT-SAMPLE.json
          export FORCE_RERUN=true
          export OPENCLAW_LATEST_FILE=ops/agent-control/reports/openclaw-latest.pr-audit.json
          node scripts/openclaw-task-runner.mjs

      - name: Outreach draft sample
        run: |
          export TASK_FILE=ops/agent-control/tasks/OC-OUTREACH-DRAFT-SAMPLE.json
          export FORCE_RERUN=true
          export OPENCLAW_LATEST_FILE=ops/agent-control/reports/openclaw-latest.pr-outreach-draft.json
          node scripts/openclaw-task-runner.mjs

      - name: Virtual browser audit sample (regression)
        run: |
          export TASK_FILE=ops/agent-control/tasks/OC-OPENCLAW-BROWSER-AUDIT-001.json
          export FORCE_RERUN=true
          export OPENCLAW_LATEST_FILE=ops/agent-control/reports/openclaw-latest.pr-browser-audit.json
          node scripts/openclaw-task-runner.mjs

      - name: Blocked unsafe customer action sample must return exit code 3
        run: |
          export TASK_FILE=ops/agent-control/tasks/OC-UNSAFE-CUSTOMER-ACTION-BLOCKED-SAMPLE.json
          export FORCE_RERUN=true
          export OPENCLAW_LATEST_FILE=ops/agent-control/reports/openclaw-latest.pr-blocked.json
          set +e
          node scripts/openclaw-task-runner.mjs
          code=$?
          set -e
          if [ "$code" -ne 3 ]; then
            echo "Expected exit code 3 for BLOCKED sample, got $code"
            exit 1
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: openclaw-pr-validation-${{ github.run_id }}-ubuntu
          path: |
            ops/agent-control/reports/openclaw-heartbeat/
            ops/agent-control/reports/worker-heartbeat/
            ops/agent-control/reports/job-lead-audit/
            ops/agent-control/reports/outreach-draft/
            ops/agent-control/reports/openclaw-latest.pr-heartbeat.json
            ops/agent-control/reports/openclaw-latest.pr-worker-heartbeat.json
            ops/agent-control/reports/openclaw-latest.pr-collect.json
            ops/agent-control/reports/openclaw-latest.pr-audit.json
            ops/agent-control/reports/openclaw-latest.pr-outreach-draft.json
            ops/agent-control/reports/openclaw-latest.pr-browser-audit.json
            ops/agent-control/reports/openclaw-latest.pr-blocked.json
          if-no-files-found: warn
