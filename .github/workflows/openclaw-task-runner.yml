name: OpenClaw Task Runner

on:
  workflow_call:
    inputs:
      task_file:
        required: true
        type: string
      force_rerun:
        required: false
        type: boolean
        default: false
      run_windows_smoke:
        required: false
        type: boolean
        default: false
      dispatch_file:
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      task_file:
        description: Task file path under ops/agent-control/tasks
        required: true
        type: string
      force_rerun:
        description: Bypass task dedupe
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_windows_smoke:
        description: Run optional Windows smoke verification
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  push:
    paths:
      - "ops/agent-control/tasks/*.json"

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

concurrency:
  group: openclaw-task-runner-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-push:
    if: github.event_name == 'push' && inputs.task_file == ''
    runs-on: ubuntu-latest
    outputs:
      task_files: ${{ steps.collect.outputs.task_files }}
      has_tasks: ${{ steps.collect.outputs.has_tasks }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Collect changed task files
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t TASK_FILES < <(git diff-tree --no-commit-id --name-only --diff-filter=AM -r "$GITHUB_SHA" -- 'ops/agent-control/tasks/*.json' | sort -u)
          if [ "${#TASK_FILES[@]}" -eq 0 ] && [ -n "${{ github.event.before }}" ]; then
            mapfile -t TASK_FILES < <(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "$GITHUB_SHA" -- 'ops/agent-control/tasks/*.json' | sort -u)
          fi
          mapfile -t DISPATCH_FILES < <(git diff-tree --no-commit-id --name-only --diff-filter=AM -r "$GITHUB_SHA" -- 'ops/agent-control/dispatch/*.json' | sort -u)
          if [ "${#DISPATCH_FILES[@]}" -eq 0 ] && [ -n "${{ github.event.before }}" ]; then
            mapfile -t DISPATCH_FILES < <(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "$GITHUB_SHA" -- 'ops/agent-control/dispatch/*.json' | sort -u)
          fi
          DISPATCH_TASK_FILES=()
          for DISPATCH_FILE in "${DISPATCH_FILES[@]}"; do
            TASK_FILE="$(node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(String(payload.task_file || '').trim());" "$DISPATCH_FILE")"
            if [ -n "$TASK_FILE" ]; then
              DISPATCH_TASK_FILES+=("$TASK_FILE")
            fi
          done
          FILTERED=()
          for FILE in "${TASK_FILES[@]}"; do
            BASENAME="$(basename "$FILE")"
            if [[ "$BASENAME" == TEMPLATE.* ]]; then
              continue
            fi
            if printf '%s\n' "${DISPATCH_TASK_FILES[@]:-}" | grep -Fxq "$FILE"; then
              continue
            fi
            TASK_STATUS="$(node -e "const fs=require('node:fs'); const payload=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(String(payload.status || '').trim());" "$FILE")"
            if [ "$TASK_STATUS" != "pending" ]; then
              continue
            fi
            FILTERED+=("$FILE")
          done
          if [ "${#FILTERED[@]}" -eq 0 ]; then
            echo 'task_files=[]' >> "$GITHUB_OUTPUT"
            echo 'has_tasks=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${FILTERED[@]}" | jq -R . | jq -s -c . | sed 's/^/task_files=/' >> "$GITHUB_OUTPUT"
          echo 'has_tasks=true' >> "$GITHUB_OUTPUT"

  run-push-tasks:
    if: github.event_name == 'push' && inputs.task_file == '' && needs.prepare-push.outputs.has_tasks == 'true'
    needs: prepare-push
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        task_file: ${{ fromJson(needs.prepare-push.outputs.task_files) }}
    env:
      TASK_FILE: ${{ matrix.task_file }}
      FORCE_RERUN: "false"
      OPENCLAW_LATEST_FILE: ops/agent-control/reports/openclaw-latest.json
      OPENCLAW_ARTIFACT_NAME: openclaw-${{ github.run_id }}-${{ strategy.job-index }}
      DEDUPE_WINDOW_MINUTES: "15"
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run OpenClaw task
        id: run_task
        continue-on-error: true
        run: node scripts/openclaw-task-runner.mjs

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.OPENCLAW_ARTIFACT_NAME }}
          path: |
            ops/agent-control/reports/
            ops/openclaw/reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit evidence
        if: always()
        id: commit_evidence
        shell: bash
        run: |
          set -euo pipefail
          cp "$OPENCLAW_LATEST_FILE" /tmp/openclaw-latest-current.json
          git fetch origin "${GITHUB_REF_NAME}"
          if git show "origin/${GITHUB_REF_NAME}:ops/agent-control/STATUS.md" >/dev/null 2>&1; then
            git checkout "origin/${GITHUB_REF_NAME}" -- ops/agent-control/STATUS.md
          fi
          if git show "origin/${GITHUB_REF_NAME}:ops/agent-control/reports/openclaw-latest.json" >/dev/null 2>&1; then
            git checkout "origin/${GITHUB_REF_NAME}" -- ops/agent-control/reports/openclaw-latest.json
          fi
          cp /tmp/openclaw-latest-current.json "$OPENCLAW_LATEST_FILE"
          node scripts/update-openclaw-status.mjs --latest "$OPENCLAW_LATEST_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "evidence_commit_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "ops(agent): add OpenClaw evidence for $(basename "$TASK_FILE" .json)"
          for ATTEMPT in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              EVIDENCE_COMMIT_SHA="$(git rev-parse HEAD)"
              echo "evidence_commit_sha=${EVIDENCE_COMMIT_SHA}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git rebase --abort || true
            if [ "$ATTEMPT" -eq 3 ]; then
              echo "Evidence push failed after 3 attempts."
              exit 1
            fi
            sleep "$ATTEMPT"
          done

      - name: Finalize latest and STATUS with evidence commit
        if: always() && steps.commit_evidence.outputs.evidence_commit_sha != ''
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          if git show "origin/${GITHUB_REF_NAME}:ops/agent-control/STATUS.md" >/dev/null 2>&1; then
            git checkout "origin/${GITHUB_REF_NAME}" -- ops/agent-control/STATUS.md
          fi
          if git show "origin/${GITHUB_REF_NAME}:ops/agent-control/reports/openclaw-latest.json" >/dev/null 2>&1; then
            git checkout "origin/${GITHUB_REF_NAME}" -- ops/agent-control/reports/openclaw-latest.json
          fi
          node -e "import('./scripts/lib/openclaw-task-lib.mjs').then((m) => { const latest = m.updateLatestEvidenceCommit(process.argv[1]); m.writeJson(m.latestReportFile, latest); });" "${{ steps.commit_evidence.outputs.evidence_commit_sha }}"
          node scripts/update-openclaw-status.mjs --latest "$OPENCLAW_LATEST_FILE" --evidence-commit-sha "${{ steps.commit_evidence.outputs.evidence_commit_sha }}"
          git add -f ops/agent-control/reports/openclaw-latest.json ops/agent-control/STATUS.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "ops(agent): finalize OpenClaw evidence metadata"
          for ATTEMPT in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            git rebase --abort || true
            if [ "$ATTEMPT" -eq 3 ]; then
              echo "Final metadata push failed after 3 attempts."
              exit 1
            fi
            sleep "$ATTEMPT"
          done

      - name: Open or update alert issue
        if: always()
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const latestPath = 'ops/agent-control/reports/openclaw-latest.json';
            if (!fs.existsSync(latestPath)) return;
            const latest = JSON.parse(fs.readFileSync(latestPath, 'utf8'));
            if (!['FAIL', 'BLOCKED', 'DEGRADED'].includes(latest.status)) return;
            const title = `[OpenClaw] ${latest.status} ${latest.dedupe_key}`;
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open "${title}"`
            });
            const body = [
              `status: ${latest.status}`,
              `task_id: ${latest.task_id}`,
              `task_type: ${latest.task_type}`,
              `task_file: ${latest.task_file}`,
              `run: ${latest.run_url}`,
              `report: ${latest.report_file}`,
              `error: ${latest.error || 'none'}`
            ].join('\n');
            if (search.data.items.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: search.data.items[0].number,
                body,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'openclaw-alert'],
            });

      - name: Open or update PR
        if: always() && steps.commit_evidence.outputs.evidence_commit_sha != '' && github.ref_name != 'main'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const task = JSON.parse(fs.readFileSync(process.env.TASK_FILE, 'utf8'));
            if (task.requires_pr !== true) return;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:${context.ref.replace('refs/heads/', '')}`;
            const base = String(task.base_branch || 'main');
            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base,
            });
            if (prs.data.length > 0) return;
            await github.rest.pulls.create({
              owner,
              repo,
              title: `[OpenClaw] ${task.id}`,
              head: context.ref.replace('refs/heads/', ''),
              base,
              body: [
                `task_id: ${task.id}`,
                `task_file: ${process.env.TASK_FILE}`,
                `run_url: ${process.env.GITHUB_RUN_URL}`,
                `requires_pr: true`,
                `allow_merge: ${task.allow_merge === true ? 'true' : 'false'}`
              ].join('\n'),
              maintainer_can_modify: false
            });

      - name: Enforce expected status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "$OPENCLAW_LATEST_FILE" ]; then
            echo "Missing $OPENCLAW_LATEST_FILE"
            exit 1
          fi
          STATUS="$(jq -r '.status' "$OPENCLAW_LATEST_FILE")"
          EXPECTED="$(jq -r '.expected_status' "$OPENCLAW_LATEST_FILE")"
          if [ "$STATUS" = "$EXPECTED" ] || [ "$STATUS" = "PASS" ] || [ "$STATUS" = "DEGRADED" ]; then
            exit 0
          fi
          echo "Task ended with $STATUS; expected $EXPECTED"
          exit 1

  run-direct-task:
    if: inputs.task_file != '' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TASK_FILE: ${{ inputs.task_file || github.event.inputs.task_file }}
      FORCE_RERUN: ${{ (inputs.force_rerun || false) && 'true' || github.event.inputs.force_rerun || 'false' }}
      DISPATCH_FILE: ${{ inputs.dispatch_file || '' }}
      OPENCLAW_LATEST_FILE: ops/agent-control/reports/openclaw-latest.json
      OPENCLAW_ARTIFACT_NAME: openclaw-${{ github.run_id }}
      DEDUPE_WINDOW_MINUTES: "15"
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
