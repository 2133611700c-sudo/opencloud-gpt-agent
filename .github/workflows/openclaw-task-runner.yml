  windows-smoke:
    if: (inputs.task_file != '' || github.event_name == 'workflow_dispatch') && (inputs.run_windows_smoke == true || github.event.inputs.run_windows_smoke == 'true')
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Verify integration
        run: node scripts/verify-openclaw-integration.mjs
