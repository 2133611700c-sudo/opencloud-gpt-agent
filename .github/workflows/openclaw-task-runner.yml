            git checkout "origin/${GITHUB_REF_NAME}" -- ops/agent-control/STATUS.md
          fi
          if git show "origin/${GITHUB_REF_NAME}:ops/agent-control/reports/openclaw-latest.json" >/dev/null 2>&1; then
            git checkout "origin/${GITHUB_REF_NAME}" -- ops/agent-control/reports/openclaw-latest.json
          fi
          cp /tmp/openclaw-latest-current.json "$OPENCLAW_LATEST_FILE"
          node scripts/update-openclaw-status.mjs --latest "$OPENCLAW_LATEST_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "evidence_commit_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "ops(agent): add OpenClaw evidence for $(basename "$TASK_FILE" .json)"
