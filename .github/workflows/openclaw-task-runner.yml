          path: |
            ops/agent-control/reports/
            ops/openclaw/reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit evidence
        if: always()
        id: commit_evidence
        shell: bash
        run: |
          set -euo pipefail
          cp "$OPENCLAW_LATEST_FILE" /tmp/openclaw-latest-current.json
          git fetch origin "${GITHUB_REF_NAME}"
