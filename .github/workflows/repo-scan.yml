name: OpenClaw Repo Scan

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Policy scan (warn only)
        run: node scripts/agent-policy-scan.mjs || true

      - name: Pricing scan (warn only)
        run: node scripts/agent-pricing-scan.mjs || true
