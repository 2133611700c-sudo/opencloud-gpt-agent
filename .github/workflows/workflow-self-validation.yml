name: Workflow Self Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate workflow YAML syntax
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
          python - <<'PY'
          import glob
          import yaml

          files = sorted(glob.glob(".github/workflows/*.yml"))
          if not files:
              raise SystemExit("No workflow files found")
          for path in files:
              with open(path, "r", encoding="utf-8") as f:
                  yaml.safe_load(f)
              print(f"OK: {path}")
          PY

      - name: Validate GitHub Actions expressions and schema
        run: |
          docker run --rm -v "$PWD:/work" -w /work rhysd/actionlint:1.7.7 -ignore 'SC2129'
